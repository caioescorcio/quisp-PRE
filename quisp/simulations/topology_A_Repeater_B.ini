[General]
network = networks.ThreeNodeTopology
sim-time-limit = 5s


**.logger.log_filename = "three_node_simulation.jsonl"

# CHANNEL DELAYS (Fixes Zero-Delay Infinite Loop)

**.distance = 10km
**.channel.v_speed = 200000km  # Speed of light in optical fiber
**.channel.datarate = 100Gbps

# APPLICATION LAYER (Node 1 -> Node 0)

**.EndToEndConnection = true

# Node 1 (EndNode[1]) is the SENDER (Encoder / Initiator)
**.EndNode[1].is_initiator = true
**.EndNode[1].app.TrafficPattern = 1
**.EndNode[1].app.LoneInitiatorAddress = 100001
**.EndNode[1].app.number_of_bellpair = 1


**.EndNode[0].app.number_of_bellpair = 0
**.EndNode[0].qrsa.hm.link_tomography = false
**.EndNode[0].qrsa.hm.initial_purification = 0
**.EndNode[0].qrsa.hm.purification_type = ""
**.EndNode[1].qrsa.hm.link_tomography = false
**.EndNode[1].qrsa.hm.initial_purification = 0
**.EndNode[1].qrsa.hm.purification_type = ""
**.Repeater[0].app.number_of_bellpair = 0
**.Repeater[0].qrsa.hm.link_tomography = false
**.Repeater[0].qrsa.hm.initial_purification = 0
**.Repeater[0].qrsa.hm.purification_type = ""


**.EndNode[1].app.request_generation_interval = 0.5s

# Force routing specifically to Bob (Assumes EndNode[0] address resolves to 0)
**.EndNode[1].app.has_specific_recipients = true
**.EndNode[1].app.possible_recipients = [100000]

# Node 0 (EndNode[0]) is the RECEIVER (Decoder / Responder)
**.EndNode[0].is_initiator = false
**.EndNode[0].app.TrafficPattern = 0

# The Repeater is entirely passive at the application layer
**.Repeater[0].app.TrafficPattern = 0


# TOPOLOGY & HARDWARE MAPPING

# Match the number of QNIC_E (Emitter QNICs) to the connections in our .ned
**.EndNode[0].number_of_qnics = 1
**.EndNode[0].total_number_of_qnics = 1

**.Repeater[0].number_of_qnics = 2
**.Repeater[0].total_number_of_qnics = 2

**.EndNode[1].number_of_qnics = 1
**.EndNode[1].total_number_of_qnics = 1

# Set all other QNIC types (Receiver, Passive) to 0 
**.number_of_qnics_r = 0
**.number_of_qnics_rp = 0

# Stationary Qubit Buffers per QNIC
**.buffers = 1


# PROTOCOL CONFIGURATION (ConnectionManager / RuleEngine variables)

**.simultaneous_es_enabled = true
**.num_remote_purification = 0
**.purification_type_cm = "SINGLE_SELECTION_X_PURIFICATION"     
**.threshold_fidelity = 0.8


# QUANTUM ERROR MODEL (Noiseless Proof-of-Concept)

# Photon emission properties
**.emission_success_probability = 1.0
**.emission_jittering_standard_deviation = 0.0

# Qubit operation error rates
**.x_measurement_error_rate = 0
**.y_measurement_error_rate = 0
**.z_measurement_error_rate = 0

**.h_gate_error_rate = 0
**.x_gate_error_rate = 0
**.z_gate_error_rate = 0
**.cnot_gate_error_rate = 0

**.memory_x_error_rate = 0
**.memory_y_error_rate = 0
**.memory_z_error_rate = 0
**.memory_energy_excitation_rate = 0
**.memory_energy_relaxation_rate = 0
**.memory_completely_mixed_rate = 0

# Dummy error ratios to satisfy StationaryQubit.cc initialization
**.h_gate_x_error_ratio = 0
**.h_gate_y_error_ratio = 0
**.h_gate_z_error_ratio = 0
**.x_gate_x_error_ratio = 0
**.x_gate_y_error_ratio = 0
**.x_gate_z_error_ratio = 0
**.z_gate_x_error_ratio = 0
**.z_gate_y_error_ratio = 0
**.z_gate_z_error_ratio = 0
**.cnot_gate_ix_error_ratio = 0
**.cnot_gate_iy_error_ratio = 0
**.cnot_gate_iz_error_ratio = 0
**.cnot_gate_xi_error_ratio = 0
**.cnot_gate_xx_error_ratio = 0
**.cnot_gate_xy_error_ratio = 0
**.cnot_gate_xz_error_ratio = 0
**.cnot_gate_yi_error_ratio = 0
**.cnot_gate_yx_error_ratio = 0
**.cnot_gate_yy_error_ratio = 0
**.cnot_gate_yz_error_ratio = 0
**.cnot_gate_zi_error_ratio = 0
**.cnot_gate_zx_error_ratio = 0
**.cnot_gate_zy_error_ratio = 0
**.cnot_gate_zz_error_ratio = 0